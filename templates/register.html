<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册界面</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 36px 20px;
            font-family: "Microsoft YaHei", Arial, sans-serif;
            background:
                linear-gradient(135deg, rgba(9, 96, 61, 0.88), rgba(22, 183, 119, 0.76)),
                url("https://images.unsplash.com/photo-1523741543316-beb7fc7023d8?auto=format&fit=crop&w=1600&q=80")
                center / cover no-repeat;
        }

        .register-box {
            width: 430px;
            max-width: 100%;
            padding: 34px 32px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.96);
            box-shadow: 0 24px 70px rgba(0, 45, 28, 0.32);
        }

        h1 {
            margin: 0 0 8px;
            color: #113f2c;
            font-size: 28px;
            text-align: center;
        }

        .subtitle {
            margin: 0 0 26px;
            color: #6b7c72;
            font-size: 14px;
            text-align: center;
        }

        .message {
            margin-bottom: 18px;
            padding: 12px 14px;
            border-radius: 6px;
            font-size: 14px;
            border-left: 4px solid;
        }

        .message.error {
            color: #9f1239;
            background: #ffe4e6;
            border-color: #e11d48;
        }

        .message.success {
            color: #116b47;
            background: #e9f7f0;
            border-color: #16b777;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #254d3a;
            font-size: 14px;
            font-weight: 600;
        }

        input {
            width: 100%;
            height: 46px;
            padding: 0 14px;
            border: 1px solid #d7e8df;
            border-radius: 6px;
            outline: none;
            color: #183c2b;
            background: #f8fcfa;
            font-size: 15px;
        }

        input:focus {
            border-color: #16b777;
            background: white;
            box-shadow: 0 0 0 4px rgba(22, 183, 119, 0.13);
        }

        .button-row {
            display: flex;
            gap: 14px;
            margin-top: 10px;
        }

        button,
        a {
            flex: 1;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            text-decoration: none;
            cursor: pointer;
        }

        button {
            color: white;
            background: #16b777;
        }

        button:hover {
            background: #129963;
        }

        a {
            color: #116b47;
            background: #e9f7f0;
        }

        a:hover {
            background: #d8f1e6;
        }
    </style>
</head>
<body>
    <form class="register-box" method="post">
        <h1>用户注册</h1>
        <p class="subtitle">创建账号后即可返回登录界面进行验证</p>

        {% if message %}
        <div class="message {{ message_type }}">{{ message }}</div>
        {% endif %}

        <div class="form-group">
            <label for="username">用户名</label>
            <input id="username" name="username" placeholder="请输入用户名" autocomplete="username">
        </div>

        <div class="form-group">
            <label for="password">密码</label>
            <input id="password" name="password" type="password" placeholder="请输入密码" autocomplete="new-password">
        </div>

        <div class="form-group">
            <label for="confirm_password">确认密码</label>
            <input id="confirm_password" name="confirm_password" type="password" placeholder="请再次输入密码" autocomplete="new-password">
        </div>

        <div class="button-row">
            <button type="submit">注册</button>
            <a href="{{ url_for('login') }}">返回登录</a>
        </div>
    </form>
</body>
</html>
