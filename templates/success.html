<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录成功</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: "Microsoft YaHei", Arial, sans-serif;
            background: #16b777;
        }

        .success-box {
            width: 420px;
            max-width: calc(100% - 40px);
            padding: 38px 32px;
            border-radius: 8px;
            text-align: center;
            background: white;
            box-shadow: 0 22px 58px rgba(0, 60, 38, 0.28);
        }

        h1 {
            margin: 0 0 14px;
            color: #116b47;
            font-size: 30px;
        }

        p {
            margin: 0 0 26px;
            color: #53665c;
            line-height: 1.8;
        }

        a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 160px;
            height: 42px;
            border-radius: 6px;
            color: white;
            background: #16b777;
            text-decoration: none;
            font-size: 15px;
        }

        a:hover {
            background: #129963;
        }
    </style>
</head>
<body>
    <div class="success-box">
        <h1>登录成功</h1>
        <p>{{ username }}，欢迎进入智慧农业环境监测系统。</p>
        <a href="{{ url_for('login') }}">返回登录</a>
    </div>
</body>
</html>
