<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统登录</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Microsoft YaHei", Arial, sans-serif;
            color: #123c2c;
            background:
                radial-gradient(circle at 18% 8%, rgba(16, 185, 129, 0.22), transparent 30%),
                radial-gradient(circle at 90% 16%, rgba(34, 197, 94, 0.12), transparent 26%),
                linear-gradient(135deg, #f8fcfa 0%, #edf8f2 58%, #e5f4ec 100%);
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image:
                linear-gradient(rgba(16, 185, 129, 0.045) 1px, transparent 1px),
                linear-gradient(90deg, rgba(16, 185, 129, 0.045) 1px, transparent 1px);
            background-size: 34px 34px;
        }

        .login-page {
            min-height: 100vh;
            display: grid;
            grid-template-columns: minmax(360px, 0.9fr) minmax(420px, 1.1fr);
            position: relative;
        }

        .brand-panel {
            padding: 48px;
            color: white;
            background:
                radial-gradient(circle at 20% 0%, rgba(34, 197, 94, 0.28), transparent 30%),
                linear-gradient(180deg, #043927 0%, #064e3b 58%, #022c22 100%);
            position: relative;
            overflow: hidden;
            box-shadow: 8px 0 30px rgba(0, 50, 35, 0.18);
        }

        .brand-panel::after {
            content: "";
            position: absolute;
            left: 48px;
            right: 48px;
            bottom: 46px;
            height: 190px;
            border: 1px solid rgba(141, 240, 181, 0.18);
            border-radius: 28px 28px 8px 8px;
            opacity: 0.72;
        }

        .brand-panel::before {
            content: "";
            position: absolute;
            width: 320px;
            height: 320px;
            right: -160px;
            top: -100px;
            border-radius: 50%;
            background: rgba(16, 185, 129, 0.14);
        }

        .brand-content {
            position: relative;
            z-index: 1;
            min-height: 100%;
            display: flex;
            flex-direction: column;
        }

        .logo-box {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 90px;
        }

        .logo-icon {
            width: 52px;
            height: 52px;
            border-radius: 18px;
            position: relative;
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.30), rgba(255, 255, 255, 0.10));
            box-shadow: inset 0 0 22px rgba(255, 255, 255, 0.10);
        }

        .logo-icon::before,
        .logo-icon::after {
            content: "";
            position: absolute;
            background: #8df0b5;
            border-radius: 100% 0 100% 0;
            transform: rotate(-35deg);
        }

        .logo-icon::before {
            width: 18px;
            height: 27px;
            left: 15px;
            top: 11px;
        }

        .logo-icon::after {
            width: 11px;
            height: 18px;
            left: 29px;
            top: 23px;
            opacity: 0.75;
        }

        .logo-title {
            font-size: 24px;
            font-weight: 900;
            line-height: 1.35;
        }

        .logo-subtitle {
            margin-top: 5px;
            color: rgba(255, 255, 255, 0.68);
            font-size: 13px;
        }

        .brand-copy {
            max-width: 460px;
        }

        .eyebrow {
            display: inline-flex;
            padding: 7px 13px;
            border-radius: 999px;
            margin-bottom: 18px;
            background: rgba(255, 255, 255, 0.10);
            color: #8df0b5;
            font-size: 12px;
            font-weight: 900;
            letter-spacing: 0.4px;
        }

        .brand-copy h1 {
            margin: 0;
            font-size: 38px;
            line-height: 1.22;
            letter-spacing: -0.5px;
        }

        .brand-copy p {
            margin: 18px 0 0;
            color: rgba(255, 255, 255, 0.76);
            font-size: 15px;
            line-height: 1.9;
        }

        .brand-footer {
            margin-top: auto;
            padding: 18px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.06);
        }

        .greenhouse-line {
            height: 48px;
            margin-bottom: 12px;
            border: 1px solid rgba(141, 240, 181, 0.28);
            border-radius: 16px 16px 5px 5px;
            position: relative;
            overflow: hidden;
        }

        .greenhouse-line::before {
            content: "";
            position: absolute;
            left: 20px;
            right: 20px;
            top: -26px;
            height: 62px;
            border: 1px solid rgba(141, 240, 181, 0.24);
            border-radius: 50% 50% 0 0;
        }

        .brand-footer strong {
            display: block;
            color: rgba(255, 255, 255, 0.86);
            font-size: 14px;
        }

        .brand-footer span {
            display: block;
            margin-top: 4px;
            color: rgba(255, 255, 255, 0.52);
            font-size: 12px;
        }

        .form-panel {
            min-width: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 48px 32px;
            position: relative;
            z-index: 1;
        }

        .login-card {
            width: 440px;
            max-width: 100%;
            padding: 34px;
            border: 1px solid rgba(15, 118, 82, 0.12);
            border-radius: 24px;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(250, 255, 252, 0.94));
            box-shadow: 0 24px 70px rgba(0, 70, 45, 0.12);
            backdrop-filter: blur(16px);
        }

        .login-card h2 {
            margin: 0;
            color: #0f2f24;
            font-size: 30px;
            font-weight: 900;
            text-align: center;
        }

        .subtitle {
            margin: 10px 0 26px;
            color: #6b8177;
            font-size: 14px;
            line-height: 1.7;
            text-align: center;
        }

        .message {
            margin-bottom: 18px;
            padding: 12px 14px;
            border-radius: 12px;
            color: #9f1239;
            background: #ffe4e6;
            font-size: 14px;
            line-height: 1.6;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #315f4c;
            font-size: 14px;
            font-weight: 800;
        }

        .input-wrap {
            position: relative;
        }

        .field-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            width: 20px;
            height: 20px;
            color: #0f8f5d;
            transform: translateY(-50%);
        }

        .user-icon::before {
            content: "";
            position: absolute;
            width: 7px;
            height: 7px;
            left: 6px;
            top: 2px;
            border: 2px solid currentColor;
            border-radius: 50%;
        }

        .user-icon::after {
            content: "";
            position: absolute;
            width: 15px;
            height: 8px;
            left: 2px;
            bottom: 1px;
            border: 2px solid currentColor;
            border-radius: 12px 12px 3px 3px;
        }

        .lock-icon::before {
            content: "";
            position: absolute;
            width: 12px;
            height: 9px;
            left: 4px;
            bottom: 2px;
            border: 2px solid currentColor;
            border-radius: 4px;
        }

        .lock-icon::after {
            content: "";
            position: absolute;
            width: 10px;
            height: 9px;
            left: 5px;
            top: 1px;
            border: 2px solid currentColor;
            border-bottom: 0;
            border-radius: 9px 9px 0 0;
        }

        input {
            width: 100%;
            height: 48px;
            padding: 0 14px 0 46px;
            border: 1px solid #dceee6;
            border-radius: 14px;
            outline: none;
            color: #123c2c;
            background: rgba(248, 252, 250, 0.86);
            font-size: 15px;
            transition: all 0.2s ease;
        }

        input:focus {
            border-color: #10b981;
            background: white;
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.13);
        }

        .button-row {
            display: flex;
            gap: 12px;
            margin-top: 10px;
        }

        button {
            flex: 1;
            height: 46px;
            border: none;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        button[type="submit"] {
            color: white;
            background: linear-gradient(135deg, #10b981, #0f8f5d);
            box-shadow: 0 16px 30px rgba(16, 185, 129, 0.26);
        }

        button[type="submit"]:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 38px rgba(16, 185, 129, 0.34);
        }

        button[type="reset"] {
            color: #0f7049;
            background: #e8f8ef;
        }

        button[type="reset"]:hover {
            transform: translateY(-2px);
            background: #d9f3e7;
        }

        .register-link {
            height: 42px;
            margin-top: 16px;
            border-radius: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #0f7049;
            background: rgba(16, 185, 129, 0.08);
            text-decoration: none;
            font-size: 14px;
            font-weight: 800;
            transition: all 0.2s ease;
        }

        .register-link:hover {
            background: rgba(16, 185, 129, 0.14);
        }

        .tip {
            margin: 18px 0 0;
            padding: 12px;
            border-radius: 12px;
            color: #6b8177;
            background: #f4fbf7;
            font-size: 13px;
            line-height: 1.7;
            text-align: center;
        }

        @media (max-width: 900px) {
            .login-page {
                grid-template-columns: 1fr;
            }

            .brand-panel {
                min-height: auto;
                padding: 32px 24px;
            }

            .logo-box {
                margin-bottom: 28px;
            }

            .brand-copy h1 {
                font-size: 30px;
            }

            .brand-footer {
                margin-top: 34px;
            }
        }

        @media (max-width: 520px) {
            .form-panel {
                padding: 28px 18px;
            }

            .login-card {
                padding: 26px 22px;
            }

            .button-row {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <main class="login-page">
        <section class="brand-panel">
            <div class="brand-content">
                <div class="logo-box">
                    <div class="logo-icon"></div>
                    <div>
                        <div class="logo-title">温室环境监控<br>Web 系统</div>
                        <div class="logo-subtitle">Greenhouse Monitor</div>
                    </div>
                </div>

                <div class="brand-copy">
                    <div class="eyebrow">Greenhouse IoT Platform</div>
                    <h1>智慧农业环境监控后台</h1>
                    <p>接入 NLECloud 物联网云平台，实时查看温室传感器数据，掌握设备运行状态，保障作物健康生长。</p>
                </div>

                <div class="brand-footer">
                    <div class="greenhouse-line"></div>
                    <strong>Smart Agriculture Platform</strong>
                    <span>Greenhouse IoT Dashboard</span>
                </div>
            </div>
        </section>

        <section class="form-panel">
            <form class="login-card" method="post">
                <h2>系统登录</h2>
                <p class="subtitle">请输入 11 位数字用户名和密码进入系统后台</p>

                {% if message %}
                <div class="message">{{ message }}</div>
                {% endif %}

                <div class="form-group">
                    <label for="username">用户名</label>
                    <div class="input-wrap">
                        <span class="field-icon user-icon"></span>
                        <input id="username" name="username" value="{{ username or '' }}" placeholder="请输入 11 位数字用户名">
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">密码</label>
                    <div class="input-wrap">
                        <span class="field-icon lock-icon"></span>
                        <input id="password" name="password" type="password" placeholder="请输入密码">
                    </div>
                </div>

                <div class="button-row">
                    <button type="submit">登录系统</button>
                    <button type="reset">重置</button>
                </div>

                <a class="register-link" href="{{ url_for('register') }}">没有账号？去注册</a>

                <p class="tip">测试账号：15600002034<br>测试密码：123456</p>
            </form>
        </section>
    </main>
</body>
</html>
