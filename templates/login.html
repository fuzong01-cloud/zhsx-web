<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录界面</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Microsoft YaHei", Arial, sans-serif;
        }

        .login {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            background:
                linear-gradient(135deg, rgba(8, 88, 56, 0.88), rgba(22, 183, 119, 0.72)),
                url("https://images.unsplash.com/photo-1464226184884-fa280b87c399?auto=format&fit=crop&w=1600&q=80")
                center / cover no-repeat;
        }

        .login-box {
            width: 900px;
            min-height: 520px;
            display: flex;
            border-radius: 8px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.96);
            box-shadow: 0 28px 80px rgba(0, 45, 28, 0.38);
        }

        .login-left {
            width: 45%;
            padding: 52px 42px;
            color: white;
            background:
                linear-gradient(160deg, rgba(17, 107, 71, 0.96), rgba(22, 183, 119, 0.9)),
                url("https://images.unsplash.com/photo-1500382017468-9049fed747ef?auto=format&fit=crop&w=900&q=80")
                center / cover no-repeat;
            position: relative;
        }

        .login-left::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(0, 0, 0, 0.1), rgba(0, 40, 25, 0.35));
        }

        .left-content {
            position: relative;
            z-index: 1;
        }

        .system-badge {
            display: inline-block;
            padding: 8px 14px;
            margin-bottom: 28px;
            border-radius: 999px;
            font-size: 14px;
            background: rgba(255, 255, 255, 0.18);
        }

        .login-left h1 {
            margin: 0 0 18px;
            font-size: 34px;
            line-height: 1.3;
        }

        .login-left p {
            margin: 0;
            font-size: 15px;
            line-height: 1.9;
            opacity: 0.92;
        }

        .feature-list {
            margin-top: 42px;
        }

        .feature-item {
            display: flex;
            align-items: center;
            margin-bottom: 16px;
            font-size: 15px;
        }

        .feature-icon {
            width: 28px;
            height: 28px;
            margin-right: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            color: #116b47;
            background: rgba(255, 255, 255, 0.9);
            font-weight: bold;
        }

        .login-right {
            width: 55%;
            padding: 58px 56px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .login-title {
            margin-bottom: 26px;
        }

        .login-title h2 {
            margin: 0 0 10px;
            color: #113f2c;
            font-size: 30px;
        }

        .login-title p {
            margin: 0;
            color: #6b7c72;
            font-size: 14px;
        }

        .message {
            margin: 0 0 18px;
            padding: 12px 14px;
            border-radius: 6px;
            color: #9f1239;
            background: #ffe4e6;
            font-size: 14px;
            border-left: 4px solid #e11d48;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #254d3a;
            font-size: 14px;
            font-weight: 600;
        }

        input {
            width: 100%;
            height: 48px;
            padding: 0 14px;
            border: 1px solid #d7e8df;
            border-radius: 6px;
            outline: none;
            color: #183c2b;
            background: #f8fcfa;
            font-size: 15px;
            transition: 0.25s;
        }

        input:focus {
            border-color: #16b777;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(22, 183, 119, 0.13);
        }

        .button-row {
            display: flex;
            gap: 14px;
            margin-top: 10px;
        }

        button,
        .link-button {
            flex: 1;
            height: 46px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            text-decoration: none;
            cursor: pointer;
            transition: 0.25s;
        }

        button[type="submit"] {
            color: white;
            background: #16b777;
            box-shadow: 0 10px 22px rgba(22, 183, 119, 0.28);
        }

        button[type="submit"]:hover {
            background: #129963;
        }

        button[type="reset"],
        .link-button {
            color: #116b47;
            background: #e9f7f0;
        }

        button[type="reset"]:hover,
        .link-button:hover {
            background: #d8f1e6;
        }

        .footer-tip {
            margin-top: 26px;
            text-align: center;
            color: #8a9b91;
            font-size: 13px;
        }

        @media (max-width: 760px) {
            .login-box {
                width: 100%;
                flex-direction: column;
            }

            .login-left,
            .login-right {
                width: 100%;
                padding: 36px 28px;
            }

            .login-left h1 {
                font-size: 28px;
            }

            .button-row {
                flex-direction: column;
            }
        }
    </style>
</head>
<body class="login">
    <div class="login-box">
        <div class="login-left">
            <div class="left-content">
                <div class="system-badge">Agri-IoT Platform</div>
                <h1>智慧农业<br>环境监测系统</h1>
                <p>面向温室环境监测、传感器数据管理和设备智能控制，实现农业生产过程的数字化管理。</p>

                <div class="feature-list">
                    <div class="feature-item">
                        <div class="feature-icon">1</div>
                        <div>实时采集环境数据</div>
                    </div>
                    <div class="feature-item">
                        <div class="feature-icon">2</div>
                        <div>支持设备远程控制</div>
                    </div>
                    <div class="feature-item">
                        <div class="feature-icon">3</div>
                        <div>提升温室管理效率</div>
                    </div>
                </div>
            </div>
        </div>

        <form class="login-right" method="post">
            <div class="login-title">
                <h2>用户登录</h2>
                <p>请输入账号和密码进入系统管理平台</p>
            </div>

            {% if message %}
            <div class="message">{{ message }}</div>
            {% endif %}

            <div class="form-group">
                <label for="username">用户名</label>
                <input id="username" placeholder="请输入用户名" name="username" autocomplete="username">
            </div>

            <div class="form-group">
                <label for="password">密码</label>
                <input id="password" placeholder="请输入密码" name="password" type="password" autocomplete="current-password">
            </div>

            <div class="button-row">
                <button type="submit">登录系统</button>
                <button type="reset">重置</button>
            </div>

            <div class="button-row">
                <a class="link-button" href="{{ url_for('register') }}">注册账号</a>
            </div>

            <div class="footer-tip">
                测试账号：admin / 123456
            </div>
        </form>
    </div>
</body>
</html>
