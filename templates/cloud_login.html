<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>云平台授权</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 36px 20px;
            font-family: "Microsoft YaHei", Arial, sans-serif;
            background: #f2f8f5;
        }

        .box {
            width: 430px;
            max-width: 100%;
            padding: 34px 32px;
            border-radius: 8px;
            background: white;
            box-shadow: 0 24px 70px rgba(0, 45, 28, 0.18);
        }

        h1 {
            margin: 0 0 8px;
            color: #113f2c;
            font-size: 28px;
            text-align: center;
        }

        .subtitle {
            margin: 0 0 26px;
            color: #6b7c72;
            font-size: 14px;
            text-align: center;
            line-height: 1.7;
        }

        .message {
            margin-bottom: 18px;
            padding: 12px 14px;
            border-radius: 6px;
            font-size: 14px;
            border-left: 4px solid;
        }

        .message.error {
            color: #9f1239;
            background: #ffe4e6;
            border-color: #e11d48;
        }

        .message.success {
            color: #116b47;
            background: #e9f7f0;
            border-color: #16b777;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #254d3a;
            font-size: 14px;
            font-weight: 600;
        }

        input {
            width: 100%;
            height: 46px;
            padding: 0 14px;
            border: 1px solid #d7e8df;
            border-radius: 6px;
            outline: none;
            color: #183c2b;
            background: #f8fcfa;
            font-size: 15px;
        }

        input:focus {
            border-color: #16b777;
            background: white;
            box-shadow: 0 0 0 4px rgba(22, 183, 119, 0.13);
        }

        .button-row {
            display: flex;
            gap: 14px;
            margin-top: 10px;
        }

        button,
        a {
            flex: 1;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            text-decoration: none;
            cursor: pointer;
        }

        button {
            color: white;
            background: #16b777;
        }

        button:hover {
            background: #129963;
        }

        a {
            color: #116b47;
            background: #e9f7f0;
        }

        a:hover {
            background: #d8f1e6;
        }
    </style>
</head>
<body>
    <form class="box" method="post">
        <h1>云平台授权</h1>
        <p class="subtitle">根据 NLECloud 文档，先用账号密码登录获取 AccessToken，再请求设备数据。</p>

        {% if message %}
        <div class="message {{ message_type }}">{{ message }}</div>
        {% endif %}

        <div class="form-group">
            <label for="account">NLECloud 账号</label>
            <input id="account" name="account" placeholder="请输入云平台账号" autocomplete="username">
        </div>

        <div class="form-group">
            <label for="password">NLECloud 密码</label>
            <input id="password" name="password" type="password" placeholder="请输入云平台密码" autocomplete="current-password">
        </div>

        <div class="button-row">
            <button type="submit">获取 Token</button>
            <a href="{{ url_for('home') }}">返回系统</a>
        </div>
    </form>
</body>
</html>
